name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend'
        required: true
        default: true
        type: boolean

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  AWS_REGION: us-east-1

jobs:
  # ==================== CI Jobs ====================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .ts,.tsx

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: https://api.example.com

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8 linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_postgres_functional.py

  backend-integration:
    name: Backend Integration (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerve
          POSTGRES_PASSWORD: zerve
          POSTGRES_DB: zerve_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zerve -d zerve_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run PostgreSQL integration tests
        env:
          DB_TYPE: postgres
          DATABASE_URL: postgresql://zerve:zerve@localhost:5432/zerve_test
        run: pytest tests/test_postgres_functional.py -v --tb=short

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: cd frontend && npm ci && npm audit --audit-level=high
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pip audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
        continue-on-error: true

  # ==================== Deploy Jobs (main branch only) ====================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && github.event.inputs.deploy_backend != 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Package backend for Lambda
        working-directory: backend
        run: |
          pip install -r requirements.txt -t ./package
          # Remove bloat from package (saves ~100MB+)
          cd package
          rm -rf boto3* botocore* s3transfer*  # Lambda runtime provides these
          rm -rf __pycache__ */__pycache__ */*/__pycache__
          rm -rf *.dist-info */*.dist-info
          rm -rf tests test */tests */test
          rm -rf docs doc */docs */doc
          rm -rf numpy/tests numpy/*/tests
          find . -name "*.pyc" -delete
          find . -name "*.pyo" -delete
          zip -r ../backend.zip . && cd ..
          zip -g backend.zip handler.py run_web_service.py
          zip -rg backend.zip abstractions/ controllers/ managers/ services/ database/ config/ utils/
          echo "Backend package size: $(du -sh backend.zip | cut -f1)"

      - name: Upload to S3 and deploy to Lambda
        working-directory: backend
        run: |
          DEPLOY_BUCKET="${{ secrets.FRONTEND_BUCKET }}"
          S3_KEY="deploy/backend-${{ github.sha }}.zip"
          aws s3 cp backend.zip "s3://${DEPLOY_BUCKET}/${S3_KEY}"
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket "${DEPLOY_BUCKET}" \
            --s3-key "${S3_KEY}" \
            --publish

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Smoke test API
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"
          echo ""
          echo "========================================="
          echo "  Deployed to -> ${{ secrets.API_URL }}"
          echo "========================================="

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && github.event.inputs.deploy_frontend != 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.API_URL }}
          REACT_APP_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          REACT_APP_COGNITO_REGION: us-east-1

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync build/ s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Deployment summary
        run: |
          echo ""
          echo "========================================="
          echo "  Deployed to -> https://$(aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --query 'Distribution.DomainName' --output text)"
          echo "========================================="
