version: "3.8"

services:
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zerve
      POSTGRES_PASSWORD: zerve
      POSTGRES_DB: zerve_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerve -d zerve_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
